spring.application.name=apollon-backend

# Datenbank-Verbindung (PostgreSQL im Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/apollon_db
spring.datasource.username=apollon_user
spring.datasource.password=apollon_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate/JPA Konfiguration (erstellt Tabellen automatisch)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Eigene MQTT-Variablen, die wir sp‰ter im Code abgreifen
apollon.mqtt.broker-url=tcp://localhost:1883
apollon.mqtt.client-id=apollon-master-node