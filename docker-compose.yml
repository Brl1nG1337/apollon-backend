services:

  postgres:
    image: postgres:17
    container_name: apollon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: apollon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: apollon-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config

  backend:
    build: .
    container_name: apollon-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - mosquitto

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/apollon
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      SPRING_MQTT_BROKER_URL: tcp://mosquitto:1883

volumes:
  postgres-data: